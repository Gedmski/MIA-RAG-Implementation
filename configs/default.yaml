paths:
  results_root: results
  legacy_experiment_log: experiment_results.md
  legacy_csv: experiment_data.csv
  legacy_report: results_report.md

datasets:
  - name: healthcaremagic
    loader: healthcaremagic
    enabled: true
    dataset_id: RafaelMPereira/HealthCareMagic-100k-Chat-Format-en
    split: train
    index_size: 500
    eval_size: 50
    min_chars: 200
    max_chars: 2500
    text_fields:
      - text
  - name: msmarco
    loader: msmarco
    enabled: true
    dataset_id: ms_marco
    dataset_config: v1.1
    split: validation
    streaming: true
    index_size: 500
    eval_size: 50
    min_chars: 100
    max_chars: 2500
  - name: nq
    loader: nq
    enabled: true
    dataset_id: LLukas22/nq-simplified
    split: test
    index_size: 500
    eval_size: 50
    min_chars: 200
    max_chars: 2500
  - name: fiqa
    loader: fiqa
    enabled: true
    dataset_id: BeIR/fiqa
    dataset_config: corpus
    split: corpus
    index_size: 500
    eval_size: 50
    min_chars: 120
    max_chars: 2500
  - name: arxiv
    loader: arxiv
    enabled: true
    dataset_id: MaartenGr/arxiv_nlp
    split: train
    category: Computation and Language
    index_size: 500
    eval_size: 50
    min_chars: 120
    max_chars: 2500
    title_fields:
      - Titles
    abstract_fields:
      - Abstracts
    category_fields:
      - Categories

models:
  - llama3
  - mistral
  - phi3

retrievers:
  - faiss
  - bm25

embeddings:
  - sentence-transformers/all-MiniLM-L6-v2
  - BAAI/bge-small-en-v1.5

sweeps:
  num_masks:
    - 1
    - 3
    - 5
    - 7
    - 10
    - 15
    - 20
  retriever_k:
    - 1
    - 3
    - 5
    - 10
    - 15

runtime:
  proxy_model: gpt2
  masking_strategy: hard
  use_spelling_correction: true
  seed: 42
  continue_on_error: true
  limit_runs:
  llm_temperature: 0.0

reporting:
  generate_plots: true
  copy_legacy_outputs: true
